<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - AgriSmart AI</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        color: #1f2937;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        width: 100%;
        background: #fff;
        border: 1px solid #dbe3ef;
        border-radius: 12px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.5;
      }
      .hint {
        color: #4b5563;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>AgriSmart AI could not reach the internet right now.</p>
      <p class="hint">Please reconnect and refresh the page to continue with live weather, market, and AI features.</p>
    </main>
  </body>
</html>
